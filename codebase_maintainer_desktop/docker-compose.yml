version: '3.8'

services:
  desktop:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - "3000:80"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:4000}
    container_name: codebase-desktop
